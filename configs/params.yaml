seed: 42

paths:
  raw_data: data/raw/weatherHistory.csv
  processed_data: data/processed/weather_processed.parquet
  outputs: outputs/

preprocessing:
  drop_columns: ["Loud Cover", "Daily Summary"]
  target_col: Summary
  target_grouped_col: WeatherType
  datetime_col: Formatted Date
  missing_strategy: drop

features:
  numeric_cols:
    - Temperature (C)
    - Apparent Temperature (C)
    - Humidity
    - Wind Speed (km/h)
    - Wind Bearing (degrees)
    - Visibility (km)
    - Pressure (millibars)
  lag_features: [1, 2, 3, 24]
  rolling_windows: [24, 168]

mining:
  association:
    min_support: 0.05
    min_confidence: 0.5
    min_lift: 1.2
    n_bins: 3
  clustering:
    k_range: [2, 3, 4, 5, 6, 7, 8]
    best_k: 4
    algorithm: kmeans

modeling:
  test_size: 0.2
  cv_folds: 5
  class_col: WeatherType

timeseries:
  target: Temperature (C)
  resample_freq: D
  train_ratio: 0.8
  arima_order: [2, 1, 2]
  forecast_horizon: 30
